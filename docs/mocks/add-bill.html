<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2E2E30" />
  <title>tab — log a bill payment</title>
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <script src="assets/js/components.js" defer></script>
  <style>
    /* ============================================================
       Dialog framing — make it obvious this is an overlay.
       The body becomes a dimmed backdrop; .app becomes the dialog.
    ============================================================ */
    body {
      background: var(--c-overlay), radial-gradient(circle at 50% 0%, #38383b 0%, #1d1d1f 70%);
      background-blend-mode: normal;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: var(--c-overlay);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 0;
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 1;
      background: var(--c-surface);
      border-radius: var(--r-xl);
      border: 1px solid var(--c-hairline-strong);
      box-shadow: 0 30px 80px rgba(0,0,0,0.55),
                  0 2px 6px rgba(0,0,0,0.35);
      max-width: 520px;
      width: calc(100% - var(--s-5) * 2);
      margin: var(--s-5) auto;
      min-height: 0;
      overflow: hidden;
    }
    @media (min-width: 640px) {
      .app { margin: var(--s-9) auto; }
    }

    /* Dialog header — title left, close X right */
    .dialog-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: var(--s-3);
      padding: var(--s-5) var(--s-6) var(--s-3);
      border-bottom: 1px solid var(--c-hairline);
    }
    .dialog-head h2 {
      font-size: var(--fs-lg);
      color: var(--c-text-strong);
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .close-btn {
      width: 36px; height: 36px;
      display: grid; place-items: center;
      background: transparent;
      border: 1px solid var(--c-hairline-strong);
      border-radius: 50%;
      color: var(--c-text);
      cursor: pointer;
      transition: background var(--ease) 160ms, color var(--ease) 160ms, border-color var(--ease) 160ms;
    }
    .close-btn:hover {
      background: var(--c-elevated);
      color: var(--c-text-strong);
      border-color: var(--c-text-faint);
    }
    .close-btn svg { width: 16px; height: 16px; display: block; }

    /* Body of the dialog */
    main.dialog-body {
      padding: var(--s-6);
      max-height: calc(100dvh - var(--s-9) * 2 - 72px);
      overflow-y: auto;
    }

    .add-wrap { max-width: 480px; margin-inline: auto; }

    .amount-stage {
      text-align: center;
      padding: var(--s-7) 0 var(--s-5);
    }
    .amount-stage .label { color: var(--c-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600; margin-bottom: var(--s-3); }
    .amount-input {
      width: 100%;
      background: transparent;
      border: 0;
      outline: 0;
      color: var(--c-text-strong);
      font-family: var(--font-num);
      font-variant-numeric: tabular-nums;
      font-weight: 500;
      font-size: 64px;
      letter-spacing: -0.03em;
      text-align: center;
      caret-color: var(--c-text);
    }
    .amount-input::placeholder { color: var(--c-text-faint); }
    .chips {
      display: flex; gap: var(--s-2); flex-wrap: wrap; justify-content: center;
      margin-top: var(--s-3);
    }
    .submit {
      position: sticky;
      bottom: var(--s-4);
      margin-top: var(--s-7);
    }
  </style>
</head>
<body>
  <div class="app" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
    <header class="dialog-head">
      <h2 id="dialog-title">Log a bill payment</h2>
      <a class="close-btn" href="bills.html" aria-label="Close dialog">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6l-12 12"/></svg>
      </a>
    </header>

    <main class="dialog-body">
      <div class="add-wrap">
      <div class="amount-stage">
        <div class="label">Amount paid</div>
        <input class="amount-input" inputmode="decimal" placeholder="$0.00" value="$168.00" />
        <div class="chips">
          <tab-button variant="ghost" size="sm">$50</tab-button>
          <tab-button variant="ghost" size="sm">$100</tab-button>
          <tab-button variant="ghost" size="sm">$168</tab-button>
          <tab-button variant="ghost" size="sm">$250</tab-button>
        </div>
      </div>

      <div class="stack">
        <tab-input label="What was it for?" placeholder="e.g. Hydro" value="Hydro — Toronto Hydro"></tab-input>
        <tab-input label="When" type="date" value="2026-05-18"></tab-input>
        <tab-input label="Method" placeholder="cash, e-transfer, …" value="Pre-auth"></tab-input>
      </div>

      <div class="submit">
        <tab-button full>Save bill payment</tab-button>
      </div>
      </div>
    </main>
  </div>
</body>
</html>
