<div class="amount-input">
  <div class="amount-input__label" data-testid="amount-label">{{ label }}</div>
  <input
    #input
    class="amount-input__control"
    [attr.inputmode]="inputmode"
    [attr.aria-label]="label"
    [placeholder]="placeholder"
    [value]="value"
    (input)="onInput($event)" />
  <div class="amount-input__chips">
    @for (c of chips; track c) {
      <tab-button variant="ghost" size="sm" (click)="applyChip(c)">
        {{ currency }}{{ c }}
      </tab-button>
    }
  </div>
</div>
