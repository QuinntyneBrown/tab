<div class="tab-dialog" data-testid="add-loan-dialog" role="dialog" aria-modal="true">
  <header class="tab-dialog__head">
    <h2 class="tab-dialog__title">Add a loan</h2>
    <button
      type="button"
      class="tab-dialog__close"
      aria-label="Close"
      (click)="cancel()"
    >
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 6l12 12M18 6L6 18" />
      </svg>
    </button>
  </header>

  <div class="tab-dialog__body">
    <tab-amount-input
      label="Amount lent"
      [value]="amount()"
      (valueChange)="amount.set($event)"
    ></tab-amount-input>

    @if (amountInvalid()) {
      <p class="tab-dialog__hint">Enter an amount greater than zero</p>
    }

    <tab-input
      label="What was it for?"
      placeholder="e.g. groceries"
      [value]="description()"
      (valueChange)="description.set($event)"
    ></tab-input>

    <tab-input
      label="When"
      type="date"
      [value]="date()"
      (valueChange)="date.set($event)"
    ></tab-input>
    @if (dateInvalid()) {
      <p class="tab-dialog__hint">Date cannot be in the future</p>
    }

    <tab-input
      label="Method"
      placeholder="cash, e-transfer, …"
      [value]="method()"
      (valueChange)="method.set($event)"
    ></tab-input>

    <tab-input
      label="Note (optional)"
      placeholder="Anything you want recorded"
      hint="This shows on the shareable statement, so keep it factual."
      [value]="note()"
      (valueChange)="note.set($event)"
    ></tab-input>

    @if (error(); as message) {
      <p class="tab-dialog__error" role="alert">{{ message }}</p>
    }
  </div>

  <footer class="tab-dialog__foot">
    <tab-button variant="ghost" (click)="cancel()">Cancel</tab-button>
    <tab-button (click)="save()" [disabled]="!canSave()">
      {{ busy() ? 'Saving…' : 'Save loan' }}
    </tab-button>
  </footer>
</div>
