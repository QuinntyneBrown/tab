<div class="add-entry-dialog" data-testid="add-entry-dialog">
  <header class="add-entry-dialog__head">
    <h2 class="add-entry-dialog__title">{{ title() }}</h2>
    <button
      type="button"
      class="add-entry-dialog__close"
      aria-label="Close"
      (click)="cancel()"
    >
      <svg
        viewBox="0 0 24 24"
        width="20"
        height="20"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M6 6l12 12M18 6L6 18" />
      </svg>
    </button>
  </header>

  <div class="add-entry-dialog__body">
    <tab-segmented
      ariaLabel="Entry type"
      [segments]="segments"
      [value]="mode()"
      (valueChange)="setMode($event)"
    ></tab-segmented>

    <tab-amount-input
      [label]="amountLabel()"
      [value]="amount()"
      (valueChange)="amount.set($event)"
    ></tab-amount-input>

    @if (amountInvalid()) {
      <p class="add-entry-dialog__hint">Enter an amount greater than zero</p>
    }

    @if (mode() !== 'payment') {
      <tab-input
        label="What was it for?"
        placeholder="e.g. groceries"
        [value]="description()"
        (valueChange)="description.set($event)"
      ></tab-input>
    }

    <tab-input
      label="When"
      type="date"
      [value]="date()"
      (valueChange)="date.set($event)"
    ></tab-input>
    @if (dateInvalid()) {
      <p class="add-entry-dialog__hint">Date cannot be in the future</p>
    }

    <tab-input
      label="Method"
      placeholder="cash, e-transfer, …"
      [value]="method()"
      (valueChange)="method.set($event)"
    ></tab-input>

    @if (mode() === 'loan') {
      <tab-input
        label="Note (optional)"
        placeholder="Anything you want recorded"
        hint="This shows on the shareable statement, so keep it factual."
        [value]="note()"
        (valueChange)="note.set($event)"
      ></tab-input>
    }

    @if (error(); as message) {
      <p class="add-entry-dialog__error" role="alert">{{ message }}</p>
    }
  </div>

  <footer class="add-entry-dialog__foot">
    <tab-button variant="ghost" (click)="cancel()">Cancel</tab-button>
    <tab-button (click)="save()" [disabled]="!canSave()">
      {{ busy() ? 'Saving…' : 'Save entry' }}
    </tab-button>
  </footer>
</div>
