<tab-app-shell noNav data-ready>
  <tab-header title="New entry" back href="/dashboard"></tab-header>

  <main class="no-nav">
    <div class="add">
      <tab-segmented
        [segments]="segments"
        [value]="mode()"
        (valueChange)="setMode($event)"
      ></tab-segmented>

      <tab-amount-input
        [label]="amountLabel()"
        [value]="amount()"
        (valueChange)="amount.set($event)"
      ></tab-amount-input>

      <div class="add__chips">
        @for (chip of quickAmounts; track chip) {
          <tab-button variant="ghost" size="sm" (click)="quickFill(chip)">
            ${{ chip }}
          </tab-button>
        }
      </div>

      @if (amountInvalid()) {
        <p class="add__hint">Enter an amount greater than zero</p>
      }

      @if (mode() !== 'payment') {
        <tab-input
          label="What was it for?"
          placeholder="e.g. groceries"
          [value]="description()"
          (valueChange)="description.set($event)"
        ></tab-input>
      }

      <tab-input
        label="When"
        type="date"
        [value]="date()"
        (valueChange)="date.set($event)"
      ></tab-input>
      @if (dateInvalid()) {
        <p class="add__hint">Date cannot be in the future</p>
      }

      <tab-input
        label="Method"
        placeholder="cash, e-transfer, …"
        [value]="method()"
        (valueChange)="method.set($event)"
      ></tab-input>

      @if (mode() === 'loan') {
        <tab-input
          label="Note (optional)"
          placeholder="Anything you want recorded"
          hint="This shows on the shareable statement, so keep it factual."
          [value]="note()"
          (valueChange)="note.set($event)"
        ></tab-input>
      }

      @if (error(); as message) {
        <p class="add__error" role="alert">{{ message }}</p>
      }

      <div class="add__submit">
        <tab-button full (click)="save()" [disabled]="!canSave()">Save entry</tab-button>
      </div>
    </div>
  </main>
</tab-app-shell>
